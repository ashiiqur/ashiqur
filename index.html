<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image/png" href="favicon.png">
    <title>Coming Soon | Our New Website</title>
    <style>
        /* CSS Styling */
        :root {
            --primary-color: #6366f1;
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 1.5rem 1rem;
            border-radius: 12px;
            min-width: 90px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-box span {
            display: block;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .time-box .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Newsletter Form */
        .notify-form {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .notify-form input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            width: 100%;
            max-width: 300px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .notify-form input:focus {
            border-color: var(--primary-color);
        }

        .notify-form button {
            padding: 12px 24px;
            font-size: 1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        .notify-form button:hover {
            background-color: #4f46e5;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            h1 { font-size: 2.2rem; }
            .countdown { gap: 0.5rem; }
            .time-box { min-width: 70px; padding: 1rem 0.5rem; }
            .time-box span { font-size: 1.8rem; }
            .notify-form { flex-direction: column; align-items: center; }
            .notify-form input, .notify-form button { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <p>We are working hard behind the scenes to bring you a brand new experience. Be the first to know when we launch!</p>

        <div class="countdown">
            <div class="time-box">
                <span id="days">00</span>
                <div class="label">Days</div>
            </div>
            <div class="time-box">
                <span id="hours">00</span>
                <div class="label">Hours</div>
            </div>
            <div class="time-box">
                <span id="minutes">00</span>
                <div class="label">Minutes</div>
            </div>
            <div class="time-box">
                <span id="seconds">00</span>
                <div class="label">Seconds</div>
            </div>
        </div>

        <form class="notify-form" onsubmit="event.preventDefault(); alert('Thanks for subscribing!');">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </form>
    </div>

    <script>
        // Set the date we're counting down to (Year, Month (0-11), Day, Hour, Minute, Second)
        // Note: Months are 0-indexed in JS (e.g., 0 = January, 11 = December)
        // Change this date to your actual launch date!
        const launchDate = new Date("Dec 31, 2026 00:00:00").getTime();

        const updateCountdown = setInterval(function() {
            const now = new Date().getTime();
            const distance = launchDate - now;

            // Time calculations
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Display the result with leading zeros
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            // If the countdown is finished, write some text
            if (distance < 0) {
                clearInterval(updateCountdown);
                document.querySelector(".countdown").innerHTML = "<h2>We have launched!</h2>";
            }
        }, 1000);
    </script>
</body>
</html>
